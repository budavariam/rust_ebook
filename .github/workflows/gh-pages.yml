name: Build and Deploy rust-book to Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Install mdbook-epub
        run: cargo install mdbook-epub --locked

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Build rust-book
        run: |
          cd rust-book
          mdbook build
      - name: Build EPUB from HTML with pandoc
        run: |
          mkdir -p rust-book/book/epub
          pandoc rust-book/book/html/index.html -o "rust-book/book/epub/The Rust Programming Language.epub" --metadata title="The Rust Programming Language" --toc

      - name: Stage site for Pages
        run: |
          set -euo pipefail
          BOOK_COMMIT=$(git -C rust-book rev-parse HEAD)
          BOOK_COMMIT_SHORT=$(git -C rust-book rev-parse --short HEAD)
          BOOK_DATE=$(git -C rust-book show -s --format=%cI HEAD)
          rm -rf public/book
          mkdir -p public/book
          cp -a rust-book/book/. public/book/
          cp "rust-book/book/epub/The Rust Programming Language.epub" "public/book/The Rust Programming Language.epub"
          REPO_URL="https://github.com/${{ github.repository }}"
          perl -pe "s/__COMMIT__/${BOOK_COMMIT}/g; s/__COMMIT_SHORT__/${BOOK_COMMIT_SHORT}/g; s/__DATE__/${BOOK_DATE}/g; s#__REPO_URL__#${REPO_URL}#g" public/index.template.html > public/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
